spring.application.name=jira
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI:${SPRING_MONGODB_URI:}}
server.port=${PORT:8080}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.attachments.dir=${ATTACHMENTS_DIR:uploads/attachments}
app.reminder.fixed-delay-ms=${REMINDER_FIXED_DELAY_MS:300000}
app.mail.enabled=${MAIL_ENABLED:false}
app.verification.base-url=${VERIFICATION_BASE_URL:http://localhost:3000/verify-email}
app.reset-password.base-url=${RESET_PASSWORD_BASE_URL:http://localhost:3000/login?resetToken=}
app.google.client-id=${GOOGLE_CLIENT_ID:}
app.email.require-deliverable-domain=${EMAIL_REQUIRE_DELIVERABLE_DOMAIN:true}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
