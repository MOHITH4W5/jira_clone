services:
  - type: web
    name: jira-clone-api
    runtime: docker
    plan: free
    branch: master
    autoDeploy: true
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    healthCheckPath: /health
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: MAIL_ENABLED
        value: "false"
      - key: VERIFICATION_BASE_URL
        value: https://jira-clone-sooty.vercel.app/verify-email
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: RECAPTCHA_ENABLED
        value: "true"
      - key: RECAPTCHA_SECRET_KEY
        sync: false
    buildFilter:
      paths:
        - server/**
        - render.yaml
